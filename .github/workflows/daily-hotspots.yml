name: 三站热点日报

on:
  # 每天 UTC 01:00 执行（北京时间 09:00）
  schedule:
    - cron: '0 1 * * *'
  # 支持手动触发
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-hotspots:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout 仓库
        uses: actions/checkout@v4

      - name: 🐍 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 📦 安装依赖
        run: |
          pip install -r requirements.txt

      - name: 🚀 执行热点抓取
        run: |
          python fetch_hotspots.py

      - name: 📤 提交报告到仓库
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add reports/
          git diff --staged --quiet || git commit -m "📡 热点日报 $(date +'%Y-%m-%d')"
          git push

      - name: 📋 输出报告摘要
        run: |
          TODAY=$(date +'%Y-%m-%d')
          if [ -f "reports/${TODAY}.md" ]; then
            echo "## 📡 今日热点报告" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            cat "reports/${TODAY}.md" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ 今日报告生成失败" >> $GITHUB_STEP_SUMMARY
          fi
